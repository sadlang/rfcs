# معجم منمنمات التجميع العربيّ — معماريّة i686 (مسودّة مرفقة بـRFC «اللهجات الأصيلة القابلة للتوسّع»)
# الوجهة النهائيّة بعد القبول: language-truth/dialects/assembly_mnemonics/i686.yaml
#
# هذا الملفّ هو الموضع الوحيد في المنظومة الذي تُذكَر فيه المنمنمات اللاتينيّة — توثيقًا للتقابل وخفضًا.
# مبادئ التسمية:
#   ١. فعل أمر أوّلًا (امتداد قاعدة مدمجات العتاد: اقرأ_منفذ/اكتب_ذاكرة).
#   ٢. الصفة تلي الموصوف وتطابقه جنسًا.
#   ٣. التغطية بحاجة النحلة الفعليّة (أرضيّة _start/ISR/__divdi3/memset + بقايا sgdt/sidt) لا شموليّة x86.
#   ٤. منمنمة غير معجميّة = خطأ كتالوج، لا تمرير صامت.
#   ٥. «عُد» لـret (لا «ارجع» — محجوزة للغة ص نفسها)، ولا استعمال لأيّ كلمة ص محجوزة.
#   ٦. «اقفز_إذا_…» يليها فعل (ساوى/فاض/حمل) أو اسم بتقدير «كان» يُكتب مجرّدًا في المنمنمة (صفر/أصغر/دون/فوق/سالب) — كلاهما مقبول.
#   ٧. الصيغة المعتمدة في SoT مشكولة بالشدّة، والمرادف المجرّد يولَّد آليًّا (المترجم يجرّد الشدّة).

version: "0.1-draft"
architecture: i686
status: draft

# ─── السجلّات ───────────────────────────────────────────────
# محسوم (2026-07-22): أسماء دلاليّة لـi686 — أدوار سجلّات x86 محفورة في العتاد فتُقرأ في الكود.
# الترقيم المحايد (س٠…) يُعتمد لاحقًا للمعماريّات المتعامدة (RISC-V) كلٌّ في ملفّها.
registers:
  general_32:
    - { ar: المركم,        en: eax, role: "المراكمة ونتائج الضرب/القسمة والعائد" }
    - { ar: القاعدة,       en: ebx, role: "قاعدة عنونة عامّة" }
    - { ar: العدّاد,       en: ecx, role: "عدّاد التكرار والإزاحة" }
    - { ar: البيانات,      en: edx, role: "امتداد المركم في الضرب/القسمة والمنافذ" }
    - { ar: فهرس_المصدر,   en: esi, role: "فهرس المصدر في عمليّات السلاسل (لا يلتبس بدور المعامل «مصدر»)" }
    - { ar: فهرس_الوجهة,   en: edi, role: "فهرس الوجهة في عمليّات السلاسل" }
    - { ar: قاعدة_الإطار,  en: ebp, role: "قاعدة إطار المكدّس الحاليّ" }
    - { ar: رأس_المكدّس,   en: esp, role: "رأس المكدّس" }
  general_16:  # النصف الأدنى ١٦ بت: لاحقة _١٦
    - { ar: المركم_١٦, en: ax }
    - { ar: العدّاد_١٦, en: cx }
    - { ar: البيانات_١٦, en: dx }
  general_8:   # الثُّمن الأدنى/الأعلى: لاحقتا _الأدنى/_الأعلى
    - { ar: المركم_الأدنى, en: al }
    - { ar: المركم_الأعلى, en: ah }
    - { ar: العدّاد_الأدنى, en: cl, role: "المعامل الوحيد المقبول لمقدار إزاحة/تدوير متغيّر" }
    - { ar: البيانات_الأدنى, en: dl }
  segment:
    - { ar: مقطع_الكود,     en: cs }
    - { ar: مقطع_البيانات,  en: ds }
    - { ar: مقطع_المكدّس,   en: ss }
    - { ar: مقطع_الوجهة,    en: es, role: "مقطع وجهة عمليّات السلاسل ES:EDI" }
  control:  # سجلّات التحكّم تُقرأ/تُكتب بالمدمجات الأصيلة القائمة (اقرأ_سجل_تحكم…)؛ تُذكر هنا للعنونة فقط
    - { ar: سجلّ_التحكّم_٠, en: cr0 }
    - { ar: سجلّ_التحكّم_٢, en: cr2 }
    - { ar: سجلّ_التحكّم_٣, en: cr3 }

# ─── صيغة العنونة (مسودّة) ─────────────────────────────────
# مباشر:            انقل المركم، ٥
# سجلّ:             انقل المركم، القاعدة
# ذاكرة [قاعدة+إزاحة]:  انقل المركم، [القاعدة + ٤]
# ذاكرة [قاعدة+فهرس×حجم+إزاحة]: انقل المركم، [القاعدة + العدّاد × ٤ + ٨]
# متغيّر ص:          انقل المركم، {عنوان_المخزن}   ← ربط تلقائيّ بقيد InlineAsm
addressing_note: "الترتيب: الوجهة أوّلًا ثمّ المصدر (اصطلاح Intel — كترتيب المفعولين في «سلّم فلانًا الشيءَ»)"

# ─── التعليمات ──────────────────────────────────────────────
instructions:

  نقل_وبيانات:
    - { ar: انقل,            en: mov,    operands: [وجهة, مصدر] }
    - { ar: انقل_بتصفير,     en: movzx,  operands: [وجهة, مصدر], note: "توسيع بلا إشارة" }
    - { ar: انقل_بمدّ_الإشارة, en: movsx, operands: [وجهة, مصدر] }
    - { ar: بادل,            en: xchg,   operands: [وجهة, مصدر] }
    - { ar: حمّل_عنوان,      en: lea,    operands: [وجهة, ذاكرة] }
    - { ar: ادفع,            en: push,   operands: [مصدر] }
    - { ar: اسحب,            en: pop,    operands: [وجهة] }
    - { ar: ادفع_الكلّ,      en: pusha,  operands: [] }
    - { ar: اسحب_الكلّ,      en: popa,   operands: [] }
    - { ar: ادفع_الأعلام,    en: pushf,  operands: [] }
    - { ar: اسحب_الأعلام,    en: popf,   operands: [] }

  حساب:
    - { ar: اجمع,             en: add,  operands: [وجهة, مصدر] }
    - { ar: اجمع_بالحمل,      en: adc,  operands: [وجهة, مصدر] }
    - { ar: اطرح,             en: sub,  operands: [وجهة, مصدر] }
    - { ar: اطرح_بالاستلاف,   en: sbb,  operands: [وجهة, مصدر] }
    - { ar: اضرب,             en: mul,  operands: [مصدر], note: "بلا إشارة؛ الناتج البيانات:المركم (الأعلى في البيانات)" }
    - { ar: اضرب_بإشارة,      en: imul, operands: [وجهة, مصدر], note: "الصيغة الأحاديّة (ناتج البيانات:المركم) تُضاف عند حاجة __muldi3" }
    - { ar: اقسم,             en: div,  operands: [مصدر], note: "بلا إشارة؛ يقسم البيانات:المركم على المصدر — الخارج في المركم والباقي في البيانات؛ صفّر البيانات قبلها وإلا #DE. أساسٌ تُبنى فوقه __divdi3" }
    - { ar: اقسم_بإشارة,      en: idiv, operands: [مصدر], note: "مدّ الإشارة قبلها بـمدّ_الإشارة_للبيانات" }
    - { ar: مدّ_الإشارة_للبيانات, en: cdq, operands: [], note: "يمدّ إشارة المركم إلى البيانات — واجبة قبل اقسم_بإشارة" }
    - { ar: زد,               en: inc,  operands: [وجهة] }
    - { ar: أنقص,             en: dec,  operands: [وجهة] }
    - { ar: اعكس_الإشارة,     en: neg,  operands: [وجهة] }

  منطق_وبتّات:
    - { ar: وافق,             en: and,  operands: [وجهة, مصدر], note: "تبقى البتّات حيث يتوافق المعاملان («طابق» رُفضت — كلمة ص محجوزة). محسوم: معجم البتّيّات موحَّد على أسماء اللهجة — المدمجات بت_و/بت_أو/بت_حصري/بت_نفي تُرحَّل إليها (دَين ترحيل متتبَّع)" }
    - { ar: ضمّ,              en: or,   operands: [وجهة, مصدر], note: "ضمّ البتّات" }
    - { ar: خالف,             en: xor,  operands: [وجهة, مصدر], note: "تُرفع البتّات المختلفة؛ خالف س، س = تصفير" }
    - { ar: اعكس_البتّات,     en: not,  operands: [وجهة] }
    - { ar: افحص,             en: test, operands: [أ, ب], note: "وافق بلا كتابة — يضبط الأعلام فقط" }
    - { ar: قارن,             en: cmp,  operands: [أ, ب] }
    - { ar: أزح_يسارًا,       en: shl,  operands: [وجهة, مقدار] }
    - { ar: أزح_يمينًا,       en: shr,  operands: [وجهة, مقدار] }
    - { ar: أزح_يمينًا_بإشارة, en: sar, operands: [وجهة, مقدار] }
    - { ar: دوّر_يسارًا,      en: rol,  operands: [وجهة, مقدار] }
    - { ar: دوّر_يمينًا,      en: ror,  operands: [وجهة, مقدار] }

  قفز_وتحكّم:
    - { ar: اقفز,                    en: jmp, operands: [لصيقة] }
    - { ar: اقفز_إذا_ساوى,           en: je,  operands: [لصيقة] }
    - { ar: اقفز_إذا_لم_يساوِ,       en: jne, operands: [لصيقة] }
    - { ar: اقفز_إذا_صفر,            en: jz,  operands: [لصيقة], note: "مرادف اقفز_إذا_ساوى — يُقبل الاسمان؛ محسوم: المنسّق يطبّع حسب السياق (بعد قارن ⇒ ساوى، بعد افحص/أنقص ⇒ صفر)" }
    - { ar: اقفز_إذا_لم_يصفر,        en: jnz, operands: [لصيقة], note: "مرادف اقفز_إذا_لم_يساوِ — تطبيع سياقيّ كسابقه" }
    - { ar: اقفز_إذا_أصغر,           en: jl,  operands: [لصيقة], note: "مقارنة بإشارة" }
    - { ar: اقفز_إذا_أصغر_أو_ساوى,   en: jle, operands: [لصيقة] }
    - { ar: اقفز_إذا_أكبر,           en: jg,  operands: [لصيقة] }
    - { ar: اقفز_إذا_أكبر_أو_ساوى,   en: jge, operands: [لصيقة] }
    - { ar: اقفز_إذا_دون,            en: jb,  operands: [لصيقة], note: "مقارنة بلا إشارة" }
    - { ar: اقفز_إذا_دون_أو_ساوى,    en: jbe, operands: [لصيقة] }
    - { ar: اقفز_إذا_فوق,            en: ja,  operands: [لصيقة] }
    - { ar: اقفز_إذا_فوق_أو_ساوى,    en: jae, operands: [لصيقة] }
    - { ar: اقفز_إذا_حمل,            en: jc,  operands: [لصيقة] }
    - { ar: اقفز_إذا_فاض,            en: jo,  operands: [لصيقة] }
    - { ar: اقفز_إذا_سالب,           en: js,  operands: [لصيقة] }
    - { ar: أنقص_واقفز_إن_لم_يصفر,   en: loop, operands: [لصيقة], note: "يُنقص العدّاد ويقفز ما لم يصفر (لا «كرّر» في الاسم — محجوزة لبادئة rep)" }
    - { ar: نادِ,                    en: call, operands: [هدف] }
    - { ar: عُد,                     en: ret,  operands: [], note: "«عُد» لا «ارجع» — الأخيرة كلمة ص محجوزة" }
    - { ar: عُد_من_المقاطعة,         en: iret, operands: [] }
    - { ar: استدعِ_مقاطعة,           en: int,  operands: [رقم] }

  مقاطعات_ونظام:
    - { ar: عطّل_المقاطعات,   en: cli,   operands: [] }
    - { ar: فعّل_المقاطعات,   en: sti,   operands: [] }
    - { ar: أوقف,             en: hlt,   operands: [] }
    - { ar: لا_عمل,           en: nop,   operands: [] }
    - { ar: خزّن_جدول_الواصفات,  en: sgdt,  operands: [ذاكرة], note: "بقايا C الأخيرة في النحلة — الدافع المباشر للهجة؛ يقابل المدمج القانونيّ القائم حمل_جدول_واصفات" }
    - { ar: خزّن_جدول_المقاطعات, en: sidt,  operands: [ذاكرة], note: "يقابل المدمج القانونيّ القائم حمل_جدول_مقاطعات" }
    - { ar: اقرأ_عدّاد_الدورات,  en: rdtsc, operands: [], note: "دورات المعالج لا الزمن؛ الناتج البيانات:المركم — يوائم المدمج القائم عداد_الدورات" }
    - { ar: استخبر_المعالج,      en: cpuid, operands: [], note: "الدخل الضمنيّ: رقم الورقة في المركم؛ المخرجات في المركم/القاعدة/العدّاد/البيانات" }

  سلاسل_وذاكرة:
    - { ar: انقل_بايت,        en: movsb, operands: [], note: "من [فهرس_المصدر] إلى [فهرس_الوجهة]" }
    - { ar: انقل_مربّعًا,     en: movsd, operands: [], note: "٤ بايتات دفعةً — أساس memcpy السريع" }
    - { ar: خزّن_بايت,        en: stosb, operands: [], note: "أساس memset الأرضيّة" }
    - { ar: خزّن_مربّعًا,     en: stosd, operands: [], note: "٤ بايتات دفعةً — memset السريع عبر كرّر خزّن_مربّعًا" }
    - { ar: كرّر,             en: rep,   operands: [تعليمة], note: "بادئة تكرار بالعدّاد: كرّر خزّن_بايت. اللبس مع اللصائق محسوم بالنقطتين، والمفضَّل أسلوبيًّا لصائق كـ«حلقة:» لا «كرّر:»" }

# ─── خارج المعجم عمدًا ─────────────────────────────────────
# lgdt/lidt وCRn وrdmsr/wrmsr وinvlpg وin/out: لها مدمجات ص أصيلة قائمة
# (حمل_جدول_واصفات…/اقرأ_سجل_تحكم/اقرأ_منفذ… بأسمائها القانونيّة في SoT) — المدمج الأصيل مقدَّم على التجميع دائمًا،
# واللهجة لسدّ ما لا مدمج له.
# سجلّات SSE (xmm0–7) وتعليماتها (movd/pxor…): مؤجَّلة عمدًا إلى حاجة فعليّة
# (مسبار xmm7 في أرضيّة النحلة يُقيَّم عندئذٍ)، تُضاف فئةً مستقلّةً حينها.
# صيغة ret imm16 (تنظيف الوسائط): تُضاف عند الحاجة — «عُد» الحاليّة بلا معامل.
# سجلّات ثانوية (bx/bl/bh/ch، fs/gs، cr4): تُضاف بحاجة النحلة وفق المبدأ ٣.
